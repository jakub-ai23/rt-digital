# build-pages.yml — GitHub Actions: Build Eleventy → Deploy to GitHub Pages
# Created: 2026-04-17
# Last updated: 2026-04-17
#
# Decision: GitHub Actions deploy (NOT committing _site/).
# Rationale: _site/ is a build artifact — it doesn't belong in version control.
# The Actions workflow runs npm ci + npm run build on every push to main,
# then deploys the _site/ output via the official actions/deploy-pages action.
# This keeps the repo clean and makes the build reproducible from source.
#
# Setup required (one-time, in repo Settings → Pages):
#   Source: GitHub Actions (NOT "Deploy from a branch")

name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build with Eleventy
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
